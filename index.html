<!-- SCRIPT PASSWORD -->
<script>
function cekPassword(passwordBenar, linkFile) {
  let input = prompt("Masukkan kata sandi:");

  if (input === passwordBenar) {
    window.open(linkFile, "_blank");
  } else if (input !== null) {
    alert("Password salah!");

}
